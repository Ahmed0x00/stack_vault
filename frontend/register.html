<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StackVault — Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08090c;
    --surface:#111319;
    --surface-2:#161922;
    --border:#22252e;
    --accent:#6d5ef8;
    --accent-2:#5a4ce0;
    --accent-soft:rgba(109,94,248,0.12);
    --green:#22e08f;
    --text:#f4f4f6;
    --text-mid:#9a9ca6;
    --text-dim:#65676f;
    --telegram:#29a9eb;
    --telegram-hover:#1f97d4;
    --font:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font);
    line-height:1.5;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    position:relative;
    overflow:hidden;
  }
  body::before{
    content:"";
    position:absolute;
    top:-120px; left:50%; transform:translateX(-50%);
    width:640px; height:420px;
    background:radial-gradient(closest-side, rgba(109,94,248,0.18), transparent 75%);
    pointer-events:none;
  }
  a{color:inherit; text-decoration:none;}
  button{font-family:var(--font); cursor:pointer;}

  .card{
    position:relative;
    width:100%;
    max-width:420px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:34px 32px 30px;
  }

  .logo{display:flex; align-items:center; gap:11px; margin-bottom:28px;}
  .logo-mark{
    width:36px; height:36px;
    border-radius:10px;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:16px;
  }
  .logo-text .name{font-weight:700; font-size:16px; line-height:1.1;}
  .logo-text .tag{font-size:11.5px; color:var(--text-dim);}

  h1{font-size:22px; font-weight:700; margin-bottom:4px;}
  .sub{color:var(--text-mid); font-size:13.5px; margin-bottom:24px;}

  .telegram-btn{
    width:100%;
    display:flex; align-items:center; justify-content:center; gap:9px;
    background:var(--telegram); color:#fff;
    border:none; padding:12px 16px; border-radius:10px;
    font-size:14px; font-weight:600;
    margin-bottom:18px;
    transition:opacity .15s;
  }
  .telegram-btn:hover{background:var(--telegram-hover);}
  .telegram-btn svg{width:18px; height:18px; flex-shrink:0;}

  .divider{
    display:flex; align-items:center; gap:12px;
    color:var(--text-dim); font-size:11.5px;
    letter-spacing:.04em; margin-bottom:18px;
  }
  .divider::before, .divider::after{
    content:""; flex:1; height:1px; background:var(--border);
  }

  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12.5px; color:var(--text-mid); margin-bottom:6px;}

  .input-wrap{position:relative;}
  .input-wrap > svg{
    position:absolute; left:12px; top:50%; transform:translateY(-50%);
    width:15px; height:15px; color:var(--text-dim); pointer-events:none;
  }
  .field input{
    width:100%;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:9px;
    padding:11px 12px 11px 36px;
    color:var(--text); font-size:13.5px; font-family:var(--font);
    outline:none;
  }
  .field input::placeholder{color:var(--text-dim);}
  .field input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }

  .toggle-visibility{
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    width:15px; height:15px; color:var(--text-dim);
    background:none; border:none; padding:0;
  }

  .terms{
    display:flex; align-items:flex-start; gap:9px;
    margin:18px 0 20px;
  }
  .terms input{
    margin-top:2px; accent-color:var(--accent);
    width:14px; height:14px; flex-shrink:0;
  }
  .terms span{font-size:12.5px; color:var(--text-mid); line-height:1.5;}
  .terms a{color:var(--accent); font-weight:600;}
  .terms a:hover{opacity:.85;}

  .create-btn{
    width:100%;
    background:var(--accent); color:#fff;
    border:none; padding:12px 16px; border-radius:10px;
    font-size:14px; font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition:opacity .15s;
  }
  .create-btn:hover{opacity:.9;}

  .footer-row{
    text-align:center; margin-top:20px;
    font-size:13px; color:var(--text-mid);
  }
  .footer-row a{color:var(--accent); font-weight:600;}
  .footer-row a:hover{opacity:.85;}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">S</div>
    <div class="logo-text">
      <div class="name">StackVault</div>
      <div class="tag">Digital Subscriptions &amp; Keys</div>
    </div>
  </div>

  <h1>Create your account</h1>
  <p class="sub">Sign up to start buying digital subscriptions and license keys.</p>

  <a href="https://decohomz.com/sv-api/auth/telegram-redirect" class="telegram-btn" id="telegram-register-btn">
    <svg viewBox="0 0 240 240" fill="none">
      <path fill="white"
        d="M54 118l134-51c6-2 12 2 10 10l-23 108c-2 9-8 11-15 7l-38-28-19 18c-2 2-4 3-7 3l3-38 70-63c3-3-1-4-4-2l-87 55-37-12c-8-2-8-8 2-11z" />
    </svg>
    Continue with Telegram
  </a>

  <div class="divider">OR SIGN UP WITH EMAIL</div>

  <div class="field">
    <label>Username</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>
      </svg>
      <input type="text" placeholder="Choose a username">
    </div>
  </div>

  <div class="field">
    <label>Email address</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="5" width="18" height="14" rx="2"/>
        <path d="M3 7l9 6 9-6"/>
      </svg>
      <input type="email" placeholder="you@example.com">
    </div>
  </div>

  <div class="field">
    <label>Password</label>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="5" y="11" width="14" height="9" rx="2"/>
        <path d="M8 11V8a4 4 0 018 0v3"/>
      </svg>
      <input type="password" placeholder="Create a password">
      <button class="toggle-visibility" type="button" aria-label="Show password">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <label class="terms">
    <input type="checkbox">
    <span>I agree to StackVault's <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</span>
  </label>

  <button class="create-btn" type="submit">
    Create Account
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M9 6l6 6-6 6"/>
    </svg>
  </button>

  <div class="footer-row">
    Already have an account? <a href="login.html">Log in</a>
  </div>
</div>

<script>
const API_BASE = 'https://decohomz.com/sv-api';

function getToken() {
  return localStorage.getItem('sv_token');
}

function getUser() {
  return JSON.parse(localStorage.getItem('sv_user') || 'null');
}

async function apiFetch(endpoint, options = {}) {
  const token = getToken();
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;

  const res = await fetch(`${API_BASE}${endpoint.replace(/^\/api/, '')}`, { ...options, headers: { ...headers, ...options.headers } });
  const data = await res.json();

  if (res.status === 401 || res.status === 403) {
    localStorage.removeItem('sv_token');
    localStorage.removeItem('sv_user');
    window.location.href = 'login.html';
    return null;
  }

  if (!res.ok) throw { status: res.status, ...data };
  return data;
}

if (getToken() && getUser()) {
  window.location.href = 'home.html';
}

const usernameInput = document.querySelector('.field input[type="text"]');
const emailInput = document.querySelector('.field input[type="email"]');
const passwordInput = document.querySelector('.field input[type="password"]');
const termsCheckbox = document.querySelector('.terms input[type="checkbox"]');
const createBtn = document.querySelector('.create-btn');
const toggleBtn = document.querySelector('.toggle-visibility');


const errorEl = document.createElement('div');
errorEl.style.cssText = 'color:#f66161;font-size:12.5px;margin-bottom:12px;display:none;';
createBtn.parentNode.insertBefore(errorEl, createBtn);

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.style.display = 'block';
}

function clearError() {
  errorEl.textContent = '';
  errorEl.style.display = 'none';
}

toggleBtn.addEventListener('click', () => {
  const isPassword = passwordInput.type === 'password';
  passwordInput.type = isPassword ? 'text' : 'password';
});



createBtn.addEventListener('click', async (e) => {
  e.preventDefault();
  clearError();

  const username = usernameInput.value.trim();
  const email = emailInput.value.trim();
  const password = passwordInput.value;

  if (!username) {
    showError('Username is required');
    return;
  }
  if (!email) {
    showError('Email is required');
    return;
  }
  if (!password) {
    showError('Password is required');
    return;
  }
  if (password.length < 6) {
    showError('Password must be at least 6 characters long');
    return;
  }
  if (!termsCheckbox.checked) {
    showError('You must agree to the Terms of Service');
    return;
  }

  const originalHTML = createBtn.innerHTML;
  createBtn.disabled = true;
  createBtn.textContent = 'Creating account...';

  try {
    const data = await apiFetch('/api/auth/register', {
      method: 'POST',
      body: JSON.stringify({ email, username, password })
    });

    localStorage.setItem('sv_token', data.token);
    localStorage.setItem('sv_user', JSON.stringify(data.user));
    window.location.href = 'home.html';
  } catch (err) {
    if (err && err.error) {
      showError(err.error);
    } else {
      showError('Server unavailable, try again');
    }
    createBtn.disabled = false;
    createBtn.innerHTML = originalHTML;
  }
});

[usernameInput, emailInput, passwordInput].forEach((input) => {
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') createBtn.click();
  });
});
</script>

</body>
</html>
